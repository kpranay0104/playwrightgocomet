name: UI Test Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL of the app under test'
        required: false
        type: string
      valid_username:
        description: 'Valid username'
        required: false
        type: string
      valid_password:
        description: 'Valid password'
        required: false
        type: string
      invalid_username:
        description: 'Invalid username'
        required: false
        type: string
      invalid_password:
        description: 'Invalid password'
        required: false
        type: string

jobs:
  ui-tests:
    name: Run Playwright BDD UI tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      # If this run was manually triggered and you typed a value into the
      # form, use that. Otherwise (a normal push/PR run, where there's no
      # form) fall back to the repo secret/variable.
      BASE_URL: ${{ inputs.base_url || vars.BASE_URL }}
      VALID_USERNAME: ${{ inputs.valid_username || secrets.VALID_USERNAME }}
      VALID_PASSWORD: ${{ inputs.valid_password || secrets.VALID_PASSWORD }}
      INVALID_USERNAME: ${{ inputs.invalid_username || secrets.INVALID_USERNAME }}
      INVALID_PASSWORD: ${{ inputs.invalid_password || secrets.INVALID_PASSWORD }}

    steps:
      - name: Mask manually entered passwords in logs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::add-mask::${{ inputs.valid_password }}"
          echo "::add-mask::${{ inputs.invalid_password }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests (generates BDD tests, then runs them)
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report-bdd/
          retention-days: 14

      - name: Upload JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: test-results.json
          retention-days: 14